<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mind Map Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Nunito+Sans:wght@400;600;700&family=Roboto:wght@400;500;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="editor-wrap">

    <!-- TOOLBAR -->
    <div class="toolbar">
      <a href="projects.html" class="toolbar-logo-link"><img src="logo.png" alt="Logo" class="toolbar-logo"></a>
      <input type="text" class="toolbar-title" id="mapTitle" placeholder="Map Title">
      <div class="sep"></div>
      <button class="tb-btn" id="btnMyMaps"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</button>
      <div class="sep"></div>
      <button class="tb-btn primary" id="btnAddNode">+ Add Node</button>
      <div class="sep"></div>
      <div class="color-swatches">
        <div class="color-swatch" data-ci="0" style="background:#f5f0e8" title="Cream"></div>
        <div class="color-swatch" data-ci="1" style="background:#fff0c4" title="Gold"></div>
        <div class="color-swatch" data-ci="2" style="background:#f0997b" title="Coral"></div>
        <div class="color-swatch" data-ci="3" style="background:#85b7eb" title="Blue"></div>
        <div class="color-swatch" data-ci="4" style="background:#5dcaa5" title="Teal"></div>
        <div class="color-swatch" data-ci="5" style="background:#ef9f27" title="Amber"></div>
        <div class="color-swatch" data-ci="6" style="background:#185fa5" title="Navy"></div>
        <div class="color-swatch" data-ci="7" style="background:#2c2c2a" title="Dark"></div>
      </div>
      <div class="sep"></div>
      <button class="tb-btn primary" id="btnSave">Save</button><span class="save-dot" id="saveDot"></span>
      <div class="sep"></div>
      <button class="tb-btn" id="btnDraw"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:3px"><line x1="4" y1="20" x2="20" y2="4"/><polygon points="20,4 15,4 20,9"/></svg>Draw</button>
      <span class="toolbar-credits">
        designed and developed by <a href="https://ilkhom-makhkambaev.mystrikingly.com/" target="_blank">Ilkhom Makhkambaev</a>
      </span>
    </div>

    <!-- FORMAT PANEL -->
    <div class="format-panel" id="formatPanel">
      <div id="nodeFormatControls" style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
        <span class="fp-label">Font:</span>
        <select class="fp-select" id="fpFont">
          <option value="Nunito">Nunito</option>
          <option value="Nunito Sans">Nunito Sans</option>
          <option value="Roboto">Roboto</option>
          <option value="Open Sans">Open Sans</option>
          <option value="Arial">Arial</option>
          <option value="Georgia">Georgia</option>
          <option value="Courier New">Courier New</option>
          <option value="Times New Roman">Times New Roman</option>
          <option value="Verdana">Verdana</option>
          <option value="Tahoma">Tahoma</option>
          <option value="Trebuchet MS">Trebuchet MS</option>
          <option value="Impact">Impact</option>
        </select>
        <span class="fp-label">Size:</span>
        <input type="number" class="fp-input" id="fpSize" min="8" max="48" value="13">
        <span class="fp-label">Color:</span>
        <input type="color" class="fp-input" id="fpTextColor" value="#2a2520">
        <button class="fp-toggle" id="fpBold" title="Bold"><b>B</b></button>
        <button class="fp-toggle" id="fpItalic" title="Italic"><i>I</i></button>
        <div class="sep" style="height:20px"></div>
        <button class="fp-toggle" id="fpAlignL" title="Left">&#8676;</button>
        <button class="fp-toggle" id="fpAlignC" title="Center">&#8596;</button>
        <button class="fp-toggle" id="fpAlignR" title="Right">&#8677;</button>
        <div class="sep" style="height:20px"></div>
        <span class="fp-label">Shape:</span>
        <button class="fp-shape-btn" id="fpShape_rounded" title="Rounded">&#9723;</button>
        <button class="fp-shape-btn" id="fpShape_square" title="Square">&#9632;</button>
        <button class="fp-shape-btn" id="fpShape_circle" title="Circle">&#9679;</button>
        <button class="fp-shape-btn" id="fpShape_diamond" title="Diamond">&#9670;</button>
        <div class="sep" style="height:20px"></div>
        <span class="fp-label">Border:</span>
        <input type="color" class="fp-input" id="fpBorderColor" value="#c8c0b8">
        <input type="range" class="fp-range" id="fpBorderWidth" min="0" max="8" value="2">
      </div>
    </div>

    <!-- DRAW BAR (shown when draw mode is on) -->
    <div class="draw-bar" id="drawBar">
      <div class="draw-color active" data-color="#c0392b" style="background:#c0392b" title="Red"></div>
      <div class="draw-color" data-color="#2980b9" style="background:#2980b9" title="Blue"></div>
      <div class="draw-color" data-color="#27ae60" style="background:#27ae60" title="Green"></div>
      <div class="draw-color" data-color="#e07b3a" style="background:#e07b3a" title="Orange"></div>
      <div class="draw-color" data-color="#2c2c2a" style="background:#2c2c2a" title="Black"></div>
      <div class="draw-color" data-color="#9a9088" style="background:#9a9088" title="Gray"></div>
      <div class="sep" style="height:16px"></div>
      <button class="tb-btn draw-arrow-toggle active" id="btnDrawArrow" title="Toggle arrow">&#8594;</button>
    </div>

    <!-- CANVAS AREA -->
    <div id="canvasContainer">
      <div id="canvas">
        <svg id="edge-svg" xmlns="http://www.w3.org/2000/svg" overflow="visible"></svg>
        <svg id="ann-svg" xmlns="http://www.w3.org/2000/svg" overflow="visible"></svg>
        <!-- Node divs are appended here by editor.js -->
      </div>
    </div>

    <div class="zoom-badge" id="zoomBadge">100%</div>
    <div class="context-menu" id="ctxMenu"></div>
  </div>

  <!-- JS modules in dependency order -->
  <script src="js/storage.js"></script>
  <script src="js/nodes.js"></script>
  <script src="js/edges.js"></script>
  <script src="js/autolayout.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/editor.js"></script>
</body>
</html>
