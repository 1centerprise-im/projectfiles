<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Files</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* Inline fallback for critical project page styles */
    .dark-projects{background:#0a0f1a;color:#fff;font-family:'Nunito Sans',sans-serif;margin:0;min-height:100vh}
    .projects-wrapper{max-width:1000px;margin:0 auto;padding:48px 24px 32px}
  </style>
</head>
<body class="dark-projects">

  <div class="projects-wrapper">
    <!-- Header -->
    <header class="projects-header">
      <div class="projects-header-left">
        <p class="projects-label" id="headerLabel">ALL PROJECTS</p>
        <h1 class="projects-title" id="headerTitle">Project Files</h1>
      </div>
      <a href="index.html" class="projects-back">&larr; BACK</a>
    </header>

    <!-- Breadcrumb (hidden at root) -->
    <div id="breadcrumb" class="breadcrumb" style="display:none">
      <a href="#" id="breadcrumbBack" class="breadcrumb-link">&larr; All Projects</a>
      <span class="breadcrumb-sep">/</span>
      <span id="breadcrumbFolder" class="breadcrumb-current"></span>
    </div>

    <!-- Filters -->
    <div class="projects-filters">
      <input type="text" id="searchInput" class="projects-search" placeholder="Search projects...">
      <button class="btn-new-folder" id="btnNewFolder">+ New Folder</button>
      <button class="btn-new-map" id="btnNewMap">+ New Map</button>
      <select id="statusFilter" class="projects-select">
        <option value="">All Statuses</option>
        <option value="active">Active</option>
        <option value="completed">Completed</option>
        <option value="on-process">On-Process</option>
      </select>
    </div>

    <!-- Folder cards grid (root view only) -->
    <div id="foldersGrid" class="folders-grid"></div>

    <!-- Root drop zone (shown when inside a folder, to move maps out) -->
    <div id="rootDropZone" class="root-drop-zone" style="display:none">
      Drop here to move to root level
    </div>

    <!-- Table -->
    <div class="projects-table-wrap">
      <table class="projects-table">
        <thead>
          <tr>
            <th class="col-num">#</th>
            <th class="col-name">PROJECT NAME</th>
            <th class="col-status">STATUS</th>
            <th class="col-action"></th>
            <th class="col-delete"></th>
          </tr>
        </thead>
        <tbody id="projectsBody">
          <!-- Rendered by home.js -->
        </tbody>
      </table>
    </div>

    <!-- Footer -->
    <footer class="projects-footer">
      <span id="projectCount">0 projects</span>
    </footer>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
