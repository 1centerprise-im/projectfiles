<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Mind Map Manager</title>
  <!-- Google Fonts: Nunito (headings/nodes) + Nunito Sans (UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Header -->
  <header class="home-header">
    <h1>My Mind Map Manager</h1>
    <p>Select an organization folder, then choose a mind map to open.</p>
  </header>

  <!-- Main content -->
  <main class="home-container">
    <div class="folders-grid" id="foldersGrid">
      <!-- Folder cards are rendered by home.js -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="home-footer">
    Developed and designed by:
    <a href="https://ilkhom-makhkambaev.mystrikingly.com/" target="_blank">Ilkhom Makhkambaev</a>
  </footer>

  <script src="js/home.js"></script>
</body>
</html>
